name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            asset: know-linux-x86_64.tar.gz
          - runner: ubuntu-24.04-arm
            asset: know-linux-arm64.tar.gz
          - runner: macos-15-intel
            asset: know-darwin-x86_64.tar.gz
          - runner: macos-15
            asset: know-darwin-arm64.tar.gz
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Confirm tag matches Cargo package version
        shell: bash
        run: |
          version="$(cargo metadata --no-deps --format-version 1 |
            python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          test "$GITHUB_REF_NAME" = "v$version"

      - name: Test
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package binary and checksum
        shell: bash
        env:
          ASSET: ${{ matrix.asset }}
        run: |
          mkdir dist
          tar -C target/release -czf "dist/$ASSET" know
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ASSET" > "$ASSET.sha256"
          else
            shasum -a 256 "$ASSET" > "$ASSET.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" dist/*
          --repo "$GITHUB_REPOSITORY"
          --verify-tag
          --generate-notes
          --title "Know $GITHUB_REF_NAME"
