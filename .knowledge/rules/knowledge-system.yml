rules:
  - id: knowledge.files.source-of-truth
    statement: "The .knowledge file tree is the canonical, version-controlled source of truth for repository knowledge."
    status: active
    applies_to: concept.knowledge-system
    evidence:
      - source: README.md
        lines: "43-55"
      - source: README.md
        lines: "394-400"

  - id: knowledge.authoring.markdown-yaml-only
    statement: "Knowledge is authored directly in Markdown and YAML files; know does not provide a custom authoring interface."
    status: active
    applies_to: concept.knowledge-system
    evidence:
      - source: README.md
        lines: "68-72"
      - source: README.md
        lines: "304-323"

  - id: knowledge.sqlite.generated-read-model
    statement: "SQLite is a generated, disposable read model used for fast querying and must be rebuildable from .knowledge files."
    status: active
    applies_to: concept.knowledge-system
    evidence:
      - source: README.md
        lines: "53-55"
      - source: README.md
        lines: "402-412"

  - id: knowledge.sqlite.indexer-only-writer
    statement: "The indexer is the only component allowed to write to SQLite."
    status: active
    applies_to: concept.knowledge-system
    evidence:
      - source: README.md
        lines: "61-72"
      - source: README.md
        lines: "346-352"

  - id: knowledge.indexes.not-versioned
    statement: "Generated indexes, including .knowledge/indexes/knowledge.sqlite, are not committed to Git."
    status: active
    applies_to: concept.knowledge-system
    evidence:
      - source: README.md
        lines: "76-90"
      - source: README.md
        lines: "228-249"

  - id: knowledge.agents.write-via-git-diffs
    statement: "Agents read through SQLite but propose writes as changes to .knowledge files and Git diffs."
    status: active
    applies_to: concept.knowledge-system
    evidence:
      - source: README.md
        lines: "327-352"
      - source: README.md
        lines: "420-424"

  - id: knowledge.traceability.required
    statement: "Knowledge should remain traceable from knowledge item to rule, evidence, and code."
    status: active
    applies_to: concept.knowledge-system
    evidence:
      - source: README.md
        lines: "414-418"
      - source: README.md
        lines: "436-441"
